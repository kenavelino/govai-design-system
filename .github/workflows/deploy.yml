name: Build & Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths-ignore:
      - "govai-design-bundle.md"  # bundle-only commits don't need a redeploy
      - "DESIGN-SYSTEM-USAGE.txt"
      - "Design.md"
      - "govai-mcp.json"
      - "mcp-server/**"
      - "scripts/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.86.0"
